<!DOCTYPE html>

    <title>Dan Beaulieu | Links</title>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(30, 41, 59, 0.85)), url('/home/images/Neobackground.jpeg') center/cover no-repeat;
            background-attachment: fixed;
            color: white;
            display: flex;

            border-radius: 50%;

            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 35px;
        }

        .link {
            display: block;
            background: #1e40af;
            color: white;
            text-decoration: none;
            padding: 16px;
            margin: 15px 0;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .link:hover {
            background: #2563eb;
            transform: translateY(-3px);
        }

        footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .hits-badge {
            margin-top: 20px;
        }
